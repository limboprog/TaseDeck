services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tasedeck
      POSTGRES_PASSWORD: tasedeck
      POSTGRES_DB: tasedeck
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasedeck -d tasedeck"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql+psycopg://tasedeck:tasedeck@db:5432/tasedeck
      REGISTRY_BASE_URL: https://registry.modelcontextprotocol.io
      SYNC_INTERVAL_HOURS: "6"
      CORS_ORIGINS: http://localhost:1420,tauri://localhost,http://tauri.localhost
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: .
    command: python worker.py
    environment:
      DATABASE_URL: postgresql+psycopg://tasedeck:tasedeck@db:5432/tasedeck
      REGISTRY_BASE_URL: https://registry.modelcontextprotocol.io
      SYNC_INTERVAL_HOURS: "6"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
